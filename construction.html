<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description"
    content="Bike Month Raleigh brings together a wide range of groups, including local nonprofits, local and regional government agencies, parks, bike shops, race teams, social clubs, breweries, coffee shops, and many more, to celebrate the fun and excitement of life on two wheels in Raleigh.">
  <meta name="author" content="Michael D'Argenio">

  <link rel="icon" href="assets\images\favicon.ico">

  <title>Bike Month Raleigh</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      background-color: black;
      color: #00ff00;
      font-family: "Courier New", Courier, monospace;
      text-align: center;

      min-height: 100svh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      margin: 0 0 1.5rem 0;
      font-size: clamp(1.6rem, 5vw, 3rem);
      letter-spacing: 2px;
      line-height: 1.1;
      animation: blink 1s infinite;
      max-width: 20ch;
    }

    p {
      margin: 0.75rem 0;
      font-size: clamp(1rem, 2.8vw, 1.2rem);
      line-height: 1.4;
    }

    .box {
      border: 2px dashed #00ff00;
      padding: 1.25rem;
      display: inline-block;
      margin: 1rem 0;
      max-width: min(90vw, 500px);
    }

    .spinner {
      margin: 3rem 0;
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      animation: spin 1s linear infinite;
    }

    footer {
      padding: 0.75rem 1rem 1rem;
      font-size: clamp(0.75rem, 2.5vw, 0.8rem);
      color: #008800;
    }

    a {
      color: orange;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @keyframes blink {
      50% {
        opacity: 0.2;
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 1.25rem 0.75rem;
      }

      .box {
        padding: 1rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>BIKE MONTH RALEIGH COMING SOON</h1>

    <div class="box">
      <p>[ SITE UNDER CONSTRUCTION ]</p>
      <p>please stand by...</p>
      <p>we are building something cool</p>
    </div>

    <div class="spinner">| / - \ |</div>

    <p style="margin-top: 2rem;">
      <a href="#">refresh</a> | <a href="#">email webmaster</a>
    </p>
    <p id="randomMessage"></p>
  </div>

  <footer>
    © forever under construction
  </footer>

  <script>
    const messages = [
      "i definitely gave you my email",
      "i dare you to hit the refresh button a zillion times",
      "this site works best in netscape navigator",
      "did you try turning your computer off and on again?",
      "404: motivation not found",
      "did you even napster?!"
    ];

    const randomIndex = Math.floor(Math.random() * messages.length);
    document.getElementById("randomMessage").textContent = messages[randomIndex];
  </script>

</body>

</html>
